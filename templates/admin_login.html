{% extends 'base.html' %}
{% block title %}Admin Login | MotorPrime{% endblock %}
{% block content %}

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <span class="logo-mark"><span>MP</span></span><span class="logo-text">MOTOR<strong>PRIME</strong></span>
    </div>
    <h2>Acceso al panel</h2>
    <form method="POST" action="{{ url_for('admin_login') }}" class="form">
      <div class="form-group">
        <label for="usuario">Usuario</label>
        <input type="text" id="usuario" name="usuario" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" name="password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary w-full">Ingresar</button>
    </form>
    <div class="login-back">
      <a href="{{ url_for('index') }}">← Volver al sitio</a>
    </div>
  </div>
</div>

{% endblock %}
